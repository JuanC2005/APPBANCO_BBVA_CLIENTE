name: appbanco_bbva_cliente
description: App Home Banking para clientes de BBVA.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.5
  go_router: ^13.0.0
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bbva_logo.png # ✅ Asegúrate de que esta línea exista
